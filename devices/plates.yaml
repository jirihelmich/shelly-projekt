# Fyzická rozmístění vypínačů/zásuvek (rámečků) na stěnách
# Digitální reprezentace nákresu v sources/nakres-puvodni.png
#
# Každý plate = jeden rámeček (fyzická krytka na stěně).
# components = seznam mechanismů v rámečku (zásuvka / jednovypínač / dvojvypínač).
# Barva / tag (HUE vs non-HUE) a napětí se derivuje z circuits.yaml podle cell.circuit.
#
# orientation = jak jsou components v rámečku uspořádány:
#   - horizontal: komponenty vedle sebe (zleva doprava)
#   - vertical: komponenty pod sebou (shora dolů)
# switch_ref = odkaz do switches.yaml (pro dohledání zapojení)

plates:
  # ============ OBÝVÁK — 1 vertikální rámeček u vstupu, 5 modulů shora dolů ============

  - id: P-OB
    room: Obývák
    location: Vstup
    orientation: vertical
    note: >
      Jeden vertikální rámeček (5-násobný). Pořadí shora dolů:
      jednovypínač → dvojvypínač → jednovypínač → dvojvypínač → dvojvypínač.
    components:
      - type: single_switch
        switch_ref: SW-A
        cells:
          - { label: "Schodiště", circuit: L-01 }
      - type: double_switch
        switch_ref: SW-B
        cells:
          - { label: "Předsíň strop", circuit: L-09, note: "sdíleno s ovládáním v dolní předsíni" }
          - { label: "Obývák strop", circuit: L-10 }
      - type: single_switch
        switch_ref: SW-E
        cells:
          - { label: "LED strop", circuit: L-12 }
      - type: double_switch
        switch_ref: SW-C
        note: "220V, nedimovat"
        cells:
          - { label: "Lišta 1", circuit: L-05 }
          - { label: "Lišta 2", circuit: L-06 }
      - type: double_switch
        switch_ref: SW-D
        cells:
          - { label: "Lišta 3", circuit: L-07 }
          - { label: "Lustr jídelna", circuit: L-04, note: "v nákresu označeno 'Lustr K', ale ovládá L-04 jídelna" }

  # ============ DOLNÍ PŘEDSÍŇ — 2 rámečky: vertikální (2 jednovypínače) + samostatný dvojvypínač ============

  - id: P-DP-F
    room: Dolní předsíň
    location: U pracovny
    orientation: vertical
    components:
      - type: single_switch
        switch_ref: SW-F1
        cells:
          - { label: "LED pásek", circuit: L-02 }
      - type: single_switch
        switch_ref: SW-F2
        cells:
          - { label: "Předsíň strop", circuit: L-09 }

  - id: P-DP-G
    room: Dolní předsíň
    location: U dveří
    orientation: horizontal
    note: "Paralelka k P-DP-F přes stávající schodišťákové dráty"
    components:
      - type: double_switch
        switch_ref: SW-G
        cells:
          - { label: "LED pásek", circuit: L-02 }
          - { label: "Předsíň strop", circuit: L-09 }

  # ============ HORNÍ PŘEDSÍŇ — 1 rámeček u schodů (2 jednovypínače) + 1 samostatný ============

  - id: P-HP
    room: Horní předsíň
    location: U schodů
    orientation: horizontal
    components:
      - type: single_switch
        switch_ref: SW-H1
        cells:
          - { label: "Schodiště", circuit: L-01, note: "2-cestné se SW-A" }
      - type: single_switch
        switch_ref: SW-H2
        cells:
          - { label: "Horní předsíň lustr", circuit: L-03 }

  # ============ HORNÍ PŘEDSÍŇ — samostatný vypínač u pokoje (paralelka k SW-H2) ============

  - id: P-CP
    room: Horní předsíň
    location: U pokoje
    orientation: horizontal
    note: "Paralelka k SW-H2 přes stávající schodišťákový drát → SH-03 SW1"
    components:
      - type: single_switch
        switch_ref: SW-CP
        cells:
          - { label: "Horní předsíň lustr", circuit: L-03 }

  # ============ JÍDELNA ============

  - id: P-JI
    room: Jídelna
    location: ""
    orientation: horizontal
    note: "2 jednovypínače v jednom rámečku (ne dvojvypínač)."
    components:
      - type: single_switch
        switch_ref: SW-J1
        cells:
          - { label: "LED", circuit: L-13, note: "LED jídelna (24V, stávající)" }
      - type: single_switch
        switch_ref: SW-J2
        cells:
          - { label: "Lustr", circuit: L-04 }

  # ============ KUCHYŇ (smíšený rámeček, 24V) ============

  - id: P-KU
    state: before_only
    room: Kuchyň
    location: ""
    orientation: horizontal
    note: "Stávající rámeček. Lišta 3 je paralelka k obývákovému SW-D1 (L-07, 220V). Ostatní tlačítka ovládají kuchyňské 24V LED (L-14, L-15, L-16) přes stávající SH-E3."
    components:
      - type: socket
        cells:
          - { label: "Z", voltage: "220V" }
      - type: single_switch
        switch_ref: SW-KU-L3
        cells:
          - { label: "Lišta 3", circuit: L-07, note: "totéž svítidlo jako Lišta 3 v obýváku" }
      - type: double_switch
        switch_ref: SW-KU-LEDAB
        cells:
          - { label: "LED A", circuit: L-14 }
          - { label: "LED B", circuit: L-15 }
      - type: single_switch
        switch_ref: SW-KU-DIG
        cells:
          - { label: "LED digestoř", circuit: L-16 }

  # ============ KUCHYŇ — STAV PO ÚPRAVĚ ============
  # Sloučení 2 jednovypínačů (Lišta 3 + LED digestoř) do 1 dvojvypínače
  # uvolní místo pro 2. zásuvku. Oba moduly v novém dvojvypínači jsou 220V.
  # LED digestoř potřebuje předsazené relé 220→24V před SH-E3.

  # ============ LOŽNICE (bokem — samostatný diagram) ============

  - id: P-LZ-ZRC
    scope: loznice
    room: Ložnice
    location: U zrcadla
    orientation: horizontal
    note: "Jednovypínač, toggluje skupinu Zrcadlo A+B přes HA."
    components:
      - type: single_switch
        switch_ref: SW-LZ-ZRC
        cells:
          - { label: "Zrcadlo A+B", circuit: L-20, note: "skupinově také L-21" }

  - id: P-LZ-D
    scope: loznice
    room: Ložnice
    location: U dveří
    orientation: horizontal
    note: "Dvojvypínač: D1 toggluje Za+Pod postelí; D2 lustr 9× Vintage."
    components:
      - type: double_switch
        switch_ref: SW-LZ-D
        cells:
          - { label: "Za+Pod postelí", circuit: L-22, note: "skupinově také L-23" }
          - { label: "Lustr", circuit: L-24 }

  - id: P-KU-AFTER
    state: after_only
    room: Kuchyň
    location: ""
    orientation: horizontal
    note: "Stav po úpravě: 2× zásuvka + dvojvypínač (Lišta 3 + LED digestoř, obě 220V — LED digestoř má předsazené relé 220→24V) + dvojvypínač (LED A + LED B, 24V)."
    components:
      - type: socket
        cells:
          - { label: "Z", voltage: "220V" }
      - type: socket
        cells:
          - { label: "Z", voltage: "220V" }
      - type: double_switch
        switch_ref: SW-KU-L3-DIG
        cells:
          - { label: "Lišta 3", circuit: L-07, voltage: "220V" }
          - { label: "LED digestoř", circuit: L-16, voltage: "220V", note: "předsazené relé 220→24V" }
      - type: double_switch
        switch_ref: SW-KU-LEDAB
        cells:
          - { label: "LED A", circuit: L-14 }
          - { label: "LED B", circuit: L-15 }

# ============ LEGENDA ============
legend:
  device_types:
    HUE: "Svítidlo v Hue ekosystému, fáze trvalá, tlačítko posílá event"
    non-HUE: "Klasický okruh, Shelly spíná fázi"
  voltages:
    "220V": "Síťové napětí 230 V~"
    "24V": "Nízké napětí 24 V (LED pásek / driver)"
  components:
    single_switch: "Jednovypínač — jedno tlačítko (ABB Tango s pružinkou)"
    double_switch: "Dvojvypínač — dvě tlačítka vedle sebe ve stejném modulu"
    socket: "Zásuvka (Z)"
  orientations:
    horizontal: "Moduly v rámečku vedle sebe (zleva doprava)"
    vertical: "Moduly v rámečku pod sebou (shora dolů)"
