# Inventář Shelly zařízení
# Source of truth pro všechna Shelly v projektu.
# Formát: id, model, umístění, funkce, vstupy/výstupy, poznámky

devices:
  # ============ NOVĚ INSTALOVANÁ ============

  - id: SH-01
    model: Shelly 1 Mini
    location: Za vypínačem SW-A v obýváku (konzole)
    function: Spíná fázi svítidla schodiště (L-01)
    mode: attached
    inputs:
      SW1: [SW-A, SW-H1]  # attached + paralelka přes stáv. schodišťák
    outputs:
      O1: L-01 (schodiště)
    controlled_by: [SW-A, SW-H1]
    notes: >
      Mini má 1 výstup a 1 vstup — stačí pro schodiště.
      SW-A připojen attached přímo na SW1; SW-H1 paralelka přes stávající schodišťákový
      drát Obývák↔Horní předsíň do stejného vstupu SW1.
      Funguje offline bez HA. Umístěno v obýváku (konzole) kvůli koncentraci instalace.

  - id: SH-02
    model: Shelly 1 Mini
    location: U LED driveru/trafa pásku (v krabičce u svítidla, dolní předsíň)
    function: Spíná 220V do LED driveru pásku (L-02)
    mode: attached
    inputs:
      SW1: [SW-F1, SW-G1]  # signálový vodič z tlačítek přes stáv. schodišťák
    outputs:
      O1: L-02 (LED pásek 220V)
    controlled_by: [SW-F1, SW-G1]
    notes: >
      Umístěno v krabičce u LED driveru, ne pod vypínačem — tam je víc místa
      a Shelly je přímo u spínaného zařízení. SW-F1 attached signálovým
      vodičem, SW-G1 paralelka přes stáv. schodišťák Pracovna↔Dveře.

  - id: SH-03
    model: Shelly 1 Mini
    location: Za vypínačem SW-CP v horní předsíni (u pokoje, P-CP)
    function: Spíná fázi lustru horní předsíně (L-03)
    mode: attached
    inputs:
      SW1: [SW-CP, SW-H2]  # SW-CP attached, SW-H2 paralelka přes stáv. schodišťák
    outputs:
      O1: L-03 (lustr horní předsíň)
    controlled_by: [SW-CP, SW-H2]
    notes: >
      Umístěno v krabici za SW-CP (samostatný v horní předsíni, P-CP) — více místa
      než u SW-H1+H2 u schodů. SW-H2 paralelka přes stáv. schodišťákový drát
      (SW-CP ↔ SW-H2). Funguje offline bez HA.

  # (dříve zde bylo SH-04 i4 za SW-J v jídelně pro Lustr jídelna L-04;
  # odstraněno — SW-J2 je paralelka k SW-D2 přes stávající schodišťákový drát
  # do SH-06 SW2 v obýváku. Krabice za SW-J v jídelně je tedy bez Shelly.)

  - id: SH-05
    model: Shelly Plus 2PM
    location: Za vypínačem SW-C v obýváku
    function: Spíná Lišta 1 (L-05) a Lišta 2 (L-06)
    mode: attached
    inputs:
      SW1: SW-C1
      SW2: SW-C2
    outputs:
      O1: L-05 (Lišta 1)
      O2: L-06 (Lišta 2)
    controlled_by: [SW-C1, SW-C2]
    notes: Mělká krabice — prosekat / KU68 kroužek.

  - id: SH-06
    model: Shelly Plus 2PM
    location: Za vypínačem SW-D v obýváku
    function: K1 spíná Lišta 3 (L-07); K2 čte tlačítka SW-D2 + SW-J2 paralelně (event → HA → Hue L-04)
    mode: mixed  # K1 attached, K2 detached
    inputs:
      SW1: [SW-D1, SW-KU-L3]  # attached + paralelka s kuchyní přes stáv. drát
      SW2: [SW-D2, SW-J2]     # detached; paralelka s jídelnou přes stáv. schodišťák
    outputs:
      O1: L-07 (Lišta 3)
      O2: unused  # L-04 je HUE — fáze trvalá
    controlled_by: [SW-D1, SW-D2, SW-J2, SW-KU-L3]
    notes: >
      K2 detached: výstup O2 nezapojen (L-04 je HUE). Stisk SW-D2 (obývák) i SW-J2
      (jídelna) pošle stejný event sh_06_input_2 — HA toggluje Hue L-04.
      Stávající schodišťákový drát Obývák↔Jídelna vede signál do SH-06 SW2.
      K1 má paralelku přes stáv. drát z kuchyňského tlačítka Lišta 3 (SW-KU-L3).

  - id: SH-07
    model: Shelly i4
    location: Za vypínači SW-A + SW-B v obýváku
    function: Čte IN2 pro L-09 Předsíň strop (3 tlačítka paralelka), IN3 pro L-10 Obývák strop
    mode: detached
    inputs:
      IN1: rezerva  # (dříve SW-A; ten je teď attached přímo na SH-01 Mini)
      IN2: [SW-B1, SW-F2, SW-G2]  # paralelka: B1 lokálně + F2/G2 přes stáv. schodišťák Obývák↔Dolní předsíň
      IN3: SW-B2  # → HA → Hue L-10
      IN4: rezerva
    outputs: []
    controlled_by: [SW-B1, SW-B2, SW-F2, SW-G2]
    notes: >
      IN2 čte 3 tlačítka paralelně (SW-B1 v obýváku + SW-F2/G2 v dolní předsíni
      přes stáv. schodišťákový drát). Všechny 3 toggluje stejnou Hue skupinu L-09.
      IN1 uvolněno (SW-A attached na SH-01).

  # (dříve zde bylo SH-08 i4 v dolní předsíni pro SW-F2+G2 event;
  # odstraněno — SH-02 Plus 2PM nyní pokrývá oba kanály: K1 attached pro LED pásek,
  # K2 detached pro Hue Předsíň strop event.)

  # (dříve zde bylo SH-09 i4 v horní předsíni pro SW-H1;
  # odstraněno — SW-H1 je teď paralelka k SW-A přes stáv. schodišťákový drát
  # do SH-01 SW1 v obýváku. Krabice u schodů (SW-H1+H2) je zcela bez Shelly —
  # SW-H1 paralelka do SH-01, SW-H2 paralelka do SH-03 (za SW-CP).)

  # (dříve zde bylo SH-10 i4 za SW-CP pro 3-cestné schodiště;
  # odstraněno po úpravě: SW-CP = paralelka k SW-H2 pro lustr přes stáv. schodišťákový drát,
  # krabice Chodba u pokoje je bez Shelly.)

  # ============ PRACOVNA (2× Plus 2PM za dvěma dvojvypínači u dveří) ============

  - id: SH-14
    model: Shelly Plus 2PM
    location: Za vypínačem SW-PR-D1 v pracovně (u dveří)
    function: Spíná Lišta pracovna 1 (L-30) a Lišta pracovna 2 (L-31)
    mode: attached
    inputs:
      SW1: SW-PR-D1-1
      SW2: SW-PR-D1-2
    outputs:
      O1: L-30 (Lišta pracovna 1)
      O2: L-31 (Lišta pracovna 2)
    controlled_by: [SW-PR-D1-1, SW-PR-D1-2]
    notes: >
      Mělká krabice — prosekat / KU68 kroužek. 4 Lišty bez paralelek (každá
      buňka = samostatný okruh).

  - id: SH-15
    model: Shelly Plus 2PM
    location: Za vypínačem SW-PR-D2 v pracovně (u dveří, vedle SW-PR-D1)
    function: Spíná Lišta pracovna 3 (L-32) a Lišta pracovna 4 (L-33)
    mode: attached
    inputs:
      SW1: SW-PR-D2-1
      SW2: SW-PR-D2-2
    outputs:
      O1: L-32 (Lišta pracovna 3)
      O2: L-33 (Lišta pracovna 4)
    controlled_by: [SW-PR-D2-1, SW-PR-D2-2]
    notes: >
      Mělká krabice — prosekat / KU68 kroužek. SH-14 + SH-15 vedle sebe
      v rámečku dvou dvojvypínačů u dveří.

  # ============ KOUPELNA HORNÍ (1× Plus 2PM: K1 attached LED trafo, K2 detached HUE event) ============

  - id: SH-16
    model: Shelly Plus 2PM
    location: Za vypínačem SW-KH-D v horní koupelně (u dveří)
    function: K1 spíná LED trafo 220V (L-34); K2 čte event SW-KH-D-2 (L-35 HUE, O2 nezapojen)
    mode: mixed  # K1 attached, K2 detached
    inputs:
      SW1: SW-KH-D-1
      SW2: SW-KH-D-2
    outputs:
      O1: L-34 (LED trafo 220V)
      O2: unused  # L-35 je HUE — fáze trvalá
    controlled_by: [SW-KH-D-1, SW-KH-D-2]
    notes: >
      K2 detached: O2 nezapojen (L-35 HUE). Event sh_16_input_2 → HA → Hue toggle.
      Zrcadlové světlo ovládá stávající samostatný vypínač (beze změny, bez Shelly).
      Mělká krabice — prosekat / KU68 kroužek. Koupelna: zvážit IP krytí
      krabice a vzdálenost od vody (zóny 0/1/2).

  # ============ WC (1× Plus 2PM: K1 attached LED+vent, K2 detached HUE event) ============

  - id: SH-17
    model: Shelly Plus 2PM
    location: Za vypínačem SW-WC-D v WC (u dveří)
    function: K1 spíná LED+ventilátor (L-36); K2 čte event SW-WC-D-2 (L-37 HUE, O2 nezapojen)
    mode: mixed  # K1 attached, K2 detached
    inputs:
      SW1: SW-WC-D-1
      SW2: SW-WC-D-2
    outputs:
      O1: L-36 (LED + ventilátor společně)
      O2: unused  # L-37 je HUE — fáze trvalá
    controlled_by: [SW-WC-D-1, SW-WC-D-2]
    notes: >
      LED i ventilátor spojené na jednom výstupu O1 (společné spínání).
      K2 detached: O2 nezapojen (L-37 HUE). Event sh_17_input_2 → HA → Hue toggle.
      Mělká krabice — prosekat / KU68 kroužek.

  # ============ STÁVAJÍCÍ (beze změny) ============

  - id: SH-E1
    model: Shelly RGBW PM
    location: Obývák (u LED stropu)
    function: Ovládá LED strop v obýváku (L-12)
    mode: attached
    status: existing
    controlled_by: [SW-E]
    notes: Stávající, beze změny.

  - id: SH-E2
    model: Shelly RGBW PM
    location: Jídelna
    function: Ovládá LED 24V v jídelně (L-13)
    mode: attached
    status: existing
    controlled_by: [SW-J1]
    notes: Stávající, beze změny.

  - id: SH-E3
    model: (neznámý, pravděpodobně Shelly RGBW PM)
    location: Kuchyň
    function: Ovládá 24V LED okruhy v kuchyni (L-14 LED A, L-15 LED B, L-16 LED digestoř)
    status: existing
    controlled_by: [SW-KU-LEDA, SW-KU-LEDB, SW-KU-DIG]
    notes: Stávající, beze změny. Model není potvrzen — ověřit při kontrole.

  # ============ LOŽNICE (bokem — samostatný diagram) ============

  - id: SH-11
    model: Shelly i4
    location: Pod vypínačem u zrcadla v ložnici
    scope: loznice
    function: Čte tlačítko u zrcadla (event → HA → toggle RGBW CH1+CH2 na SH-13)
    mode: detached
    inputs:
      IN1: SW-LZ-ZRC
      IN2: rezerva
      IN3: rezerva
      IN4: rezerva
    outputs: []
    controlled_by: [SW-LZ-ZRC]

  - id: SH-12
    model: Shelly i4
    location: Pod dvojvypínačem u dveří v ložnici
    scope: loznice
    function: IN1 čte tlačítko D1 (LED Za+Pod postelí), IN2 čte D2 (lustr 9× Vintage)
    mode: detached
    inputs:
      IN1: SW-LZ-D1  # pod postelí + za postelí (skupinově přes HA)
      IN2: SW-LZ-D2  # lustr 9× Vintage
      IN3: rezerva
      IN4: rezerva
    outputs: []
    controlled_by: [SW-LZ-D1, SW-LZ-D2]

  - id: SH-13
    model: Shelly RGBW PM
    location: V krabici za 2× 60W trafa u svítidel (ložnice)
    scope: loznice
    function: 4 kanály pro 4 LED pásky (zrcadlo A/B, za/pod postelí)
    mode: attached
    outputs:
      CH1: L-20 (Zrcadlo A)
      CH2: L-21 (Zrcadlo B)
      CH3: L-22 (Za postelí)
      CH4: L-23 (Pod postelí)
    controlled_by: [SW-LZ-ZRC, SW-LZ-D1]
    notes: 4 nezávislé kanály pro 4 samostatné LED pásky (ne RGBW barvy). HA skupinovité ovládání přes events z SH-11/12.

