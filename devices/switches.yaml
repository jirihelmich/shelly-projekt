# Fyzické vypínače a tlačítka
# ABB Tango s pružinkami = monostabilní tlačítka.
# Každé tlačítko posílá eventy (short/long/double), ne stavy.

switches:
  - id: SW-A
    room: Obývák
    position: Vstup, první dvojvypínač
    hardware: Dvojvypínač #1 (tlačítko A)
    buttons:
      - button: A
        circuit: L-01  # schodiště
        wired_to: SH-07 IN1
        mode: detached

  - id: SW-B
    room: Obývák
    position: Vstup, druhý dvojvypínač
    hardware: Dvojvypínač #2
    buttons:
      - button: B1
        circuit: L-09  # předsíň strop HUE (sdíleno s SW-F2, SW-G2)
        wired_to: SH-07 IN2
        mode: detached
      - button: B2
        circuit: L-10  # obývák strop HUE
        wired_to: SH-07 IN3
        mode: detached

  - id: SW-C
    room: Obývák
    position: Vstup, třetí dvojvypínač
    hardware: Dvojvypínač #3
    buttons:
      - button: C1
        circuit: L-05  # Lišta 1
        wired_to: SH-05 SW1
        mode: attached
      - button: C2
        circuit: L-06  # Lišta 2
        wired_to: SH-05 SW2
        mode: attached

  - id: SW-D
    room: Obývák
    position: Vstup, čtvrtý dvojvypínač
    hardware: Dvojvypínač #4
    buttons:
      - button: D1
        circuit: L-07  # Lišta 3
        wired_to: SH-06 SW1
        mode: attached
        parallel_with: SW-KU-L3
      - button: D2
        circuit: L-04  # Lustr jídelna (v nákresu "Lustr K" je nedorozumění)
        wired_to: SH-06 SW2
        mode: detached  # event → HA → SH-04 toggle

  - id: SW-E
    room: Obývák
    hardware: stávající
    buttons:
      - button: E
        circuit: L-12  # LED strop
        wired_to: SH-E1
        status: existing

  - id: SW-F1
    room: Dolní předsíň
    position: U pracovny
    hardware: Jednovypínač (vedle SW-F2)
    buttons:
      - button: F1
        circuit: L-02  # LED pásek
        wired_to: SH-02 SW1  # signálový vodič
        mode: attached
        parallel_with: SW-G1

  - id: SW-F2
    room: Dolní předsíň
    position: U pracovny
    hardware: Jednovypínač (vedle SW-F1)
    buttons:
      - button: F2
        circuit: L-09  # předsíň strop HUE
        wired_to: SH-08 IN1
        mode: detached
        parallel_with: SW-G2

  - id: SW-G
    room: Dolní předsíň
    position: U dveří
    hardware: Dvojvypínač
    shelly_in_box: NONE  # žádná Shelly v této krabici
    buttons:
      - button: G1
        circuit: L-02  # LED pásek
        wired_to: SH-02 SW1  # přes stávající schodišťákový drát, paralelně s SW-F1
        mode: parallel
      - button: G2
        circuit: L-09  # předsíň strop HUE
        wired_to: SH-08 IN1  # přes stávající schodišťákový drát, paralelně s SW-F2
        mode: parallel
    notes: Krabice bez Shelly — jen WAGO svorky pro propojení tlačítek se stávajícími schodišťákovými dráty.

  - id: SW-H1
    room: Horní předsíň
    position: U schodů
    hardware: Jednovypínač (vedle SW-H2)
    buttons:
      - button: H1
        circuit: L-01  # schodiště
        wired_to: SH-09 IN1
        mode: detached

  - id: SW-H2
    room: Horní předsíň
    position: U schodů
    hardware: Jednovypínač (vedle SW-H1)
    buttons:
      - button: H2
        circuit: L-03  # lustr horní předsíň
        wired_to: SH-03 SW1  # signálový vodič
        mode: attached
        parallel_with: SW-CP

  - id: SW-CP
    room: Horní předsíň
    position: U pokoje (samostatný vypínač v horní předsíni)
    hardware: Jednovypínač
    shelly_in_box: NONE  # žádná Shelly v této krabici
    buttons:
      - button: CP
        circuit: L-03  # lustr horní předsíň
        wired_to: SH-03 SW1  # přes stávající schodišťákový drát, paralelně s SW-H2
        mode: parallel
    notes: Krabice bez Shelly — jen tlačítko a propojení přes stávající schodišťákový drát do SH-03.

  - id: SW-J
    room: Jídelna
    hardware: Dvojvypínač
    buttons:
      - button: J1
        circuit: L-13  # LED jídelna (stávající)
        wired_to: SH-E2 SW
        status: existing
      - button: J2
        circuit: L-04  # lustr jídelna (HUE)
        wired_to: SH-04 IN1  # i4 event → HA → Hue
        mode: detached
        parallel_with: SW-D2  # oba jsou event-based, sbíhají se v HA na Hue toggle

  # ============ KUCHYŇ (stávající rámeček, doplněno kvůli sdíleným okruhům) ============

  - id: SW-KU-L3
    room: Kuchyň
    position: Stávající rámeček
    hardware: Jednovypínač (stávající)
    buttons:
      - button: KU-L3
        circuit: L-07  # Lišta 3 (sdíleno s obývákem)
        wired_to: SH-06 SW1  # paralelka k SW-D1 přes stáv. schodišťákový drát
        mode: parallel
    notes: Paralelka k SW-D1 v obýváku pro Lišta 3. Ověřit drát Obývák→Kuchyň.

  - id: SW-KU-LEDAB
    room: Kuchyň
    position: Stávající rámeček
    hardware: Dvojvypínač (stávající)
    buttons:
      - button: KU-LEDA
        circuit: L-14  # LED kuchyň A (24V)
        wired_to: SH-E3 (stávající ovládání)
        status: existing
      - button: KU-LEDB
        circuit: L-15  # LED kuchyň B (24V)
        wired_to: SH-E3 (stávající ovládání)
        status: existing
    notes: Stávající zapojení kuchyňských 24V LED, beze změny.

  - id: SW-KU-DIG
    room: Kuchyň
    position: Stávající rámeček
    hardware: Jednovypínač (stávající)
    buttons:
      - button: KU-DIG
        circuit: L-16  # LED digestoř
        wired_to: SH-E3 (stávající ovládání)
        status: existing
    notes: Stávající ovládání LED digestoře, beze změny.

# ============ SOUHRN KRABIC ============

boxes_summary:
  with_shelly:
    - {location: "Obývák vstup", devices: [SH-05, SH-06, SH-07]}
    - {location: "Dolní předsíň, pracovna (SW-F2)", devices: [SH-08]}
    - {location: "Horní předsíň, u schodů", devices: [SH-09]}
    - {location: "Jídelna, za SW-J", devices: [SH-04]}
    - {location: "U trafa LED pásku", devices: [SH-02]}
    - {location: "U svítidla schodiště", devices: [SH-01]}
    - {location: "U lustru horní předsíně", devices: [SH-03]}

  without_shelly:
    - {location: "Dolní předsíň, u dveří (SW-G)", reason: "Stáv. schodišťákové dráty vedou signál do SH-02 SW1 a SH-08 IN1"}
    - {location: "Horní předsíň, u pokoje (SW-CP)", reason: "Stáv. schodišťákový drát vede signál do SH-03 SW1 (paralelka k SW-H2)"}
