# Fyzické vypínače a tlačítka
# ABB Tango s pružinkami = monostabilní tlačítka.
# Každé tlačítko posílá eventy (short/long/double), ne stavy.

switches:
  - id: SW-A
    room: Obývák
    position: Vstup, první modul v P-OB (jednovypínač)
    hardware: Jednovypínač
    buttons:
      - button: A
        circuit: L-01  # schodiště
        wired_to: SH-01 SW1  # Mini za SW-A, attached → O1 spíná L-01
        mode: attached
        parallel_with: SW-H1  # přes stáv. schodišťákový drát Obývák↔Horní předsíň

  - id: SW-B
    room: Obývák
    position: Vstup, druhý dvojvypínač
    hardware: Dvojvypínač #2
    buttons:
      - button: B1
        circuit: L-09  # předsíň strop HUE (sdíleno s SW-F2, SW-G2)
        wired_to: SH-07 IN2
        mode: detached
      - button: B2
        circuit: L-10  # obývák strop HUE
        wired_to: SH-07 IN3
        mode: detached

  - id: SW-C
    room: Obývák
    position: Vstup, třetí dvojvypínač
    hardware: Dvojvypínač #3
    buttons:
      - button: C1
        circuit: L-05  # Lišta 1
        wired_to: SH-05 SW1
        mode: attached
      - button: C2
        circuit: L-06  # Lišta 2
        wired_to: SH-05 SW2
        mode: attached

  - id: SW-D
    room: Obývák
    position: Vstup, čtvrtý dvojvypínač
    hardware: Dvojvypínač #4
    buttons:
      - button: D1
        circuit: L-07  # Lišta 3
        wired_to: SH-06 SW1
        mode: attached
        parallel_with: SW-KU-L3
      - button: D2
        circuit: L-04  # Lustr jídelna (v nákresu "Lustr K" je nedorozumění)
        wired_to: SH-06 SW2
        mode: detached  # event → HA → Hue toggle; paralelně s SW-J2 přes stáv. schodišťák
        parallel_with: SW-J2

  - id: SW-E
    room: Obývák
    hardware: stávající
    buttons:
      - button: E
        circuit: L-12  # LED strop
        wired_to: SH-E1
        status: existing

  - id: SW-F1
    room: Dolní předsíň
    position: U pracovny
    hardware: Jednovypínač (vedle SW-F2)
    buttons:
      - button: F1
        circuit: L-02  # LED pásek
        wired_to: SH-02 SW1  # signálový vodič
        mode: attached
        parallel_with: SW-G1

  - id: SW-F2
    room: Dolní předsíň
    position: U pracovny
    hardware: Jednovypínač (vedle SW-F1)
    buttons:
      - button: F2
        circuit: L-09  # předsíň strop HUE
        wired_to: SH-02 SW2  # K2 detached (Plus 2PM)
        mode: detached
        parallel_with: SW-G2

  - id: SW-G
    room: Dolní předsíň
    position: U dveří
    hardware: Dvojvypínač
    shelly_in_box: NONE  # žádná Shelly v této krabici
    buttons:
      - button: G1
        circuit: L-02  # LED pásek
        wired_to: SH-02 SW1  # přes stávající schodišťákový drát, paralelně s SW-F1
        mode: parallel
      - button: G2
        circuit: L-09  # předsíň strop HUE
        wired_to: SH-02 SW2  # přes stávající schodišťákový drát, paralelně s SW-F2
        mode: parallel
    notes: Krabice bez Shelly — jen WAGO svorky pro propojení tlačítek se stávajícími schodišťákovými dráty.

  - id: SW-H1
    room: Horní předsíň
    position: U schodů
    hardware: Jednovypínač (vedle SW-H2)
    buttons:
      - button: H1
        circuit: L-01  # schodiště
        wired_to: SH-01 SW1  # paralelka k SW-A přes stáv. schodišťákový drát Obývák↔Horní předsíň
        mode: parallel

  - id: SW-H2
    room: Horní předsíň
    position: U schodů
    hardware: Jednovypínač (vedle SW-H1)
    buttons:
      - button: H2
        circuit: L-03  # lustr horní předsíň
        wired_to: SH-03 SW1  # paralelka k SW-CP přes stáv. schodišťák
        mode: parallel
        parallel_with: SW-CP

  - id: SW-CP
    room: Horní předsíň
    position: U pokoje (samostatný vypínač v horní předsíni, rámeček P-CP)
    hardware: Jednovypínač
    buttons:
      - button: CP
        circuit: L-03  # lustr horní předsíň
        wired_to: SH-03 SW1  # attached, v krabici za SW-CP je Mini SH-03
        mode: attached
        parallel_with: SW-H2
    notes: Krabice za SW-CP obsahuje Mini SH-03 (koncentrace k samostatnému vypínači — víc místa než u SW-H1+H2).

  - id: SW-J1
    room: Jídelna
    position: V 1 rámečku se SW-J2
    hardware: Jednovypínač
    buttons:
      - button: J1
        circuit: L-13  # LED jídelna (stávající)
        wired_to: SH-E2 SW
        status: existing

  - id: SW-J2
    room: Jídelna
    position: V 1 rámečku se SW-J1
    hardware: Jednovypínač
    buttons:
      - button: J2
        circuit: L-04  # lustr jídelna (HUE)
        wired_to: SH-06 SW2  # paralelka k SW-D2 přes stáv. schodišťákový drát do SH-06 (v obýváku)
        mode: parallel

  # ============ KUCHYŇ (stávající rámeček, doplněno kvůli sdíleným okruhům) ============

  - id: SW-KU-L3
    room: Kuchyň
    position: Stávající rámeček
    hardware: Jednovypínač (stávající)
    buttons:
      - button: KU-L3
        circuit: L-07  # Lišta 3 (sdíleno s obývákem)
        wired_to: SH-06 SW1  # paralelka k SW-D1 přes stáv. schodišťákový drát
        mode: parallel
    notes: Paralelka k SW-D1 v obýváku pro Lišta 3. Ověřit drát Obývák→Kuchyň.

  - id: SW-KU-LEDAB
    room: Kuchyň
    position: Stávající rámeček
    hardware: Dvojvypínač (stávající)
    buttons:
      - button: KU-LEDA
        circuit: L-14  # LED kuchyň A (24V)
        wired_to: SH-E3 (stávající ovládání)
        status: existing
      - button: KU-LEDB
        circuit: L-15  # LED kuchyň B (24V)
        wired_to: SH-E3 (stávající ovládání)
        status: existing
    notes: Stávající zapojení kuchyňských 24V LED, beze změny.

  - id: SW-KU-DIG
    room: Kuchyň
    position: Stávající rámeček
    hardware: Jednovypínač (stávající)
    buttons:
      - button: KU-DIG
        circuit: L-16  # LED digestoř
        wired_to: SH-E3 (stávající ovládání)
        status: existing
    notes: Stávající ovládání LED digestoře, beze změny.

# ============ SOUHRN KRABIC ============

boxes_summary:
  with_shelly:
    - {location: "Obývák vstup (SW-A/B/C/D)", devices: [SH-01, SH-05, SH-06, SH-07]}
    - {location: "Dolní předsíň, pracovna (SW-F1+F2)", devices: [SH-02]}
    - {location: "Horní předsíň, u pokoje (SW-CP, P-CP)", devices: [SH-03]}

  without_shelly:
    - {location: "Dolní předsíň, u dveří (SW-G)", reason: "Stáv. schodišťákové dráty vedou signál do SH-02 SW1 a SH-02 SW2"}
    - {location: "Horní předsíň, u schodů (SW-H1 + SW-H2)", reason: "SW-H1 paralelka do SH-01 SW1 (obývák); SW-H2 paralelka do SH-03 SW1 (SW-CP v H. předsíni)"}
    - {location: "Jídelna (SW-J1 + SW-J2)", reason: "SW-J1 na stáv. SH-E2; SW-J2 paralelka k SW-D2 přes stáv. schodišťákový drát do SH-06 SW2 v obýváku"}
