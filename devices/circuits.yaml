# Světelné okruhy
# Co Shelly ovládá. Source of truth pro mapování okruh → Shelly → vypínač.

circuits:
  - id: L-01
    name: Schodiště svítidlo
    room: Schodiště
    type: non-HUE
    voltage: 230V
    dimmable: false
    switched_by: SH-01  # Shelly 1 Mini v obývákové konzoli (za SW-A)
    controlled_from: [SW-A, SW-H1]
    control_mode: SW-A attached (SH-01 SW1), SW-H1 paralelně přes stáv. schodišťákový drát
    ha_entity: switch.sh_01_schodiste
    notes: Funguje offline bez HA. Fáze ke svítidlu schodiště vede z SH-01 O1 (v obýváku).

  - id: L-02
    name: LED pásek dolní předsíň
    room: Dolní předsíň
    type: LED-trafo
    voltage: 220V
    dimmable: false
    switched_by: SH-02  # spíná 220V stranu (primár trafa nebo přímo)
    controlled_from: [SW-F1, SW-G1]
    control_mode: 2-way parallel to SW1
    ha_entity: switch.sh_02_led_pasek
    notes: LED pásek na 220V. Shelly Plus 1PM spíná 220V stranu. Ověřit kompatibilitu s driverem pásku.

  - id: L-03
    name: Lustr horní předsíň
    room: Horní předsíň
    type: non-HUE
    voltage: 230V
    dimmable: false
    switched_by: SH-03
    controlled_from: [SW-H2, SW-CP]
    control_mode: 2-way parallel to SW1
    ha_entity: switch.sh_03_lustr_horni_predsin

  - id: L-04
    name: Lustr jídelna
    room: Jídelna
    type: HUE
    voltage: 230V (trvale)
    dimmable: true (via Hue)
    switched_by: null  # Hue, fáze trvalá
    controlled_from: [SW-J2, SW-D2]
    control_mode: 2 tlačítka paralelně → SH-06 SW2 (detached) → event → HA → Hue
    ha_entity: light.jidelna_lustr
    notes: >
      HUE lustr — fáze trvale pod proudem, žádná Shelly fázi nespíná.
      SW-D2 (obývák rámeček) a SW-J2 (jídelna) paralelně přes stávající schodišťákový drát
      do SH-06 SW2 (Plus 2PM v obýváku, detached kanál K2). Jeden event pro obě tlačítka.
      Žádná Shelly v jídelně není potřeba.

  - id: L-05
    name: Lišta 1
    room: Obývák
    type: non-HUE
    voltage: 230V
    dimmable: false
    switched_by: SH-05 K1
    controlled_from: [SW-C1]
    ha_entity: switch.sh_05_lista_1

  - id: L-06
    name: Lišta 2
    room: Obývák
    type: non-HUE
    voltage: 230V
    dimmable: false
    switched_by: SH-05 K2
    controlled_from: [SW-C2]
    ha_entity: switch.sh_05_lista_2

  - id: L-07
    name: Lišta 3
    room: Obývák
    type: non-HUE
    voltage: 230V
    dimmable: false
    switched_by: SH-06 K1
    controlled_from: [SW-D1, SW-KU-L3]
    control_mode: SW-D1 attached, SW-KU-L3 paralelka přes stáv. drát → SH-06 SW1
    ha_entity: switch.sh_06_lista_3
    notes: >
      Druhé ovládací tlačítko "Lišta 3" je ve stávajícím kuchyňském rámečku
      (SW-KU-L3). Paralelka přes stávající schodišťákový drát do SH-06 SW1.
      Ověřit fyzickou existenci drátu mezi Obývákem (SW-D) a Kuchyní.

  - id: L-09
    name: Předsíň strop
    room: Dolní předsíň
    type: HUE
    voltage: 230V (trvale)
    dimmable: true (via Hue)
    switched_by: null
    controlled_from: [SW-B1, SW-F2, SW-G2]
    control_mode: 3 tlačítka paralelně na SH-07 IN2 (i4 v obýváku) → event → HA → Hue
    ha_entity: light.dolni_predsin_strop
    notes: >
      Jedno Hue svítidlo ovládané ze 3 míst, všechna 3 tlačítka vedou
      paralelně na SH-07 IN2 v obývákové konzoli (přes stáv. schodišťákový
      drát Obývák↔Dolní předsíň mezi SW-B a SW-F2).
      HA vidí jediný event sh_07_input_2, toggluje Hue skupinu.

  - id: L-10
    name: Obývák strop
    room: Obývák
    type: HUE
    voltage: 230V (trvale)
    dimmable: true (via Hue)
    switched_by: null
    controlled_from: [SW-B2]
    ha_entity: light.obyvak_strop

  - id: L-12
    name: LED strop obývák
    room: Obývák
    type: RGBW-PM
    voltage: 24V
    dimmable: true
    switched_by: SH-E1
    controlled_from: [SW-E]
    status: existing
    notes: Stávající Shelly RGBW PM, beze změny.

  - id: L-13
    name: LED 24V jídelna
    room: Jídelna
    type: RGBW-PM
    voltage: 24V
    switched_by: SH-E2
    controlled_from: [SW-J1]
    status: existing

  - id: L-14
    name: LED kuchyň A
    room: Kuchyň
    type: RGBW-PM
    voltage: 24V
    switched_by: SH-E3
    controlled_from: [SW-KU-LEDA]
    status: existing
    notes: Stávající, součást kuchyňské 24V instalace.

  - id: L-15
    name: LED kuchyň B
    room: Kuchyň
    type: RGBW-PM
    voltage: 24V
    switched_by: SH-E3
    controlled_from: [SW-KU-LEDB]
    status: existing
    notes: Druhý 24V LED okruh v kuchyni, stávající.

  - id: L-16
    name: LED digestoř
    room: Kuchyň
    type: RGBW-PM
    voltage: 24V
    switched_by: SH-E3
    controlled_from: [SW-KU-DIG]
    status: existing
    notes: LED osvětlení digestoře, stávající.

