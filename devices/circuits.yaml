    room: Obývák
    type: non-HUE
    voltage: 230V
    dimmable: false
    switched_by: SH-05 K2
    controlled_from: [SW-C2]
    ha_entity: switch.sh_05_lista_2

  - id: L-07
    name: Lišta 3
    room: Obývák
    type: non-HUE
    voltage: 230V
    dimmable: false
    switched_by: SH-06 K1
    controlled_from: [SW-D1]
