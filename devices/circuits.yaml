# Světelné okruhy
# Co Shelly ovládá. Source of truth pro mapování okruh → Shelly → vypínač.

circuits:
  - id: L-01
    name: Schodiště svítidlo
    room: Schodiště
    type: non-HUE
    voltage: 230V
    dimmable: false
    switched_by: SH-01
    controlled_from: [SW-A, SW-H1]
    control_mode: 2-way via HA
    ha_entity: switch.sh_01_schodiste

  - id: L-02
    name: LED pásek dolní předsíň
    room: Dolní předsíň
    type: non-HUE
    voltage: 24V (přes 230V trafo)
    dimmable: false
    switched_by: SH-02  # spíná 230V primár trafa
    controlled_from: [SW-F1, SW-G1]
    control_mode: 2-way parallel to SW1
    ha_entity: switch.sh_02_led_pasek
    notes: Ověřit toleranci trafa ke spínání 230V primáru.

  - id: L-03
    name: Lustr horní předsíň
    room: Horní předsíň
    type: non-HUE
    voltage: 230V
    dimmable: false
    switched_by: SH-03
    controlled_from: [SW-H2, SW-CP]
    control_mode: 2-way parallel to SW1
    ha_entity: switch.sh_03_lustr_horni_predsin

  - id: L-04
    name: Lustr jídelna
    room: Jídelna
    type: non-HUE
    voltage: 230V
    dimmable: false
    switched_by: SH-04
    controlled_from: [SW-J2, SW-D2]
    control_mode: SW-J2 attached (SH-04 SW1), SW-D2 event → HA → SH-04 toggle
    ha_entity: switch.sh_04_lustr_jidelna
    notes: >
      Tlačítko "Lustr K" v obývákovém rámečku (SW-D2) je ve skutečnosti ovládání
      téhož jídelního lustru. Wire SW-D2 jde do SH-06 SW2 (detached), event pak
      přes HA na SH-04 toggle.

  - id: L-05
    name: Lišta 1
    room: Obývák
    type: non-HUE
    voltage: 230V
    dimmable: false
    switched_by: SH-05 K1
    controlled_from: [SW-C1]
    ha_entity: switch.sh_05_lista_1

  - id: L-06
    name: Lišta 2
    room: Obývák
    type: non-HUE
    voltage: 230V
    dimmable: false
    switched_by: SH-05 K2
    controlled_from: [SW-C2]
    ha_entity: switch.sh_05_lista_2

  - id: L-07
    name: Lišta 3
    room: Obývák
    type: non-HUE
    voltage: 230V
    dimmable: false
    switched_by: SH-06 K1
    controlled_from: [SW-D1, SW-KU-L3]
    control_mode: SW-D1 attached, SW-KU-L3 paralelka přes stáv. drát → SH-06 SW1
    ha_entity: switch.sh_06_lista_3
    notes: >
      Druhé ovládací tlačítko "Lišta 3" je ve stávajícím kuchyňském rámečku
      (SW-KU-L3). Paralelka přes stávající schodišťákový drát do SH-06 SW1.
      Ověřit fyzickou existenci drátu mezi Obývákem (SW-D) a Kuchyní.

  - id: L-09
    name: Předsíň strop
    room: Dolní předsíň
    type: HUE
    voltage: 230V (trvale)
    dimmable: true (via Hue)
    switched_by: null
    controlled_from: [SW-B1, SW-F2, SW-G2]
    control_mode: event (3 tlačítka) → HA → Hue
    ha_entity: light.dolni_predsin_strop
    notes: >
      Jedno Hue svítidlo ovládané ze 3 míst:
      SW-B1 obývák vstup (SH-07 IN2 → HA → Hue),
      SW-F2 dolní předsíň pracovna + SW-G2 dveře (paralelně na SH-08 IN1 → HA → Hue).

  - id: L-10
    name: Obývák strop
    room: Obývák
    type: HUE
    voltage: 230V (trvale)
    dimmable: true (via Hue)
    switched_by: null
    controlled_from: [SW-B2]
    ha_entity: light.obyvak_strop

  - id: L-12
    name: LED strop obývák
    room: Obývák
    type: non-HUE
    voltage: 24V
    dimmable: true
    switched_by: SH-E1
    controlled_from: [SW-E]
    status: existing
    notes: Stávající Shelly RGBW PM, beze změny. RGBW 24V LED.

  - id: L-13
    name: LED 24V jídelna
    room: Jídelna
    type: RGBW 24V (stávající)
    voltage: 24V
    switched_by: SH-E2
    controlled_from: [SW-J1]
    status: existing

  - id: L-14
    name: Kuchyň okruhy
    room: Kuchyně
    status: existing
    notes: Vyřešeno dle nákresu, stávající instalace.
