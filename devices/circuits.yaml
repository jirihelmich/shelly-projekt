  # ============ KOUPELNA HORNÍ (LED trafo 220V + HUE strop) ============

  - id: L-34
    name: LED trafo koupelna horní
    room: Koupelna horní
    type: LED-trafo
    voltage: 220V
    dimmable: false
    switched_by: SH-16 K1
    controlled_from: [SW-KH-D-1]
    control_mode: attached — SH-16 spíná 220V primár trafa
    ha_entity: switch.sh_16_led_trafo_koupelna
    notes: LED pásek / svítidlo přes trafo, 220V na primáru. Ověřit kompatibilitu trafa se spínáním primáru.

  - id: L-35
    name: Strop koupelna horní (HUE)
    room: Koupelna horní
    type: HUE
    voltage: 230V (trvale)
    dimmable: true (via Hue)
    switched_by: null  # Hue, fáze trvalá
    controlled_from: [SW-KH-D-2]
    control_mode: detached — SH-16 K2 čte event (O2 nezapojen), HA toggluje Hue skupinu
    ha_entity: light.koupelna_horni_strop
    notes: HUE svítidla ve stropě koupelny, fáze trvalá. SH-16 O2 nezapojen.

  # ============ WC (1 dvojvypínač: LED+vent společně, HUE strop) ============

  - id: L-36
    name: WC LED + ventilátor
    room: WC
    type: non-HUE
    voltage: 230V
    dimmable: false
    switched_by: SH-17 K1
    controlled_from: [SW-WC-D-1]
    control_mode: attached — jedno tlačítko spíná LED i ventilátor společně (paralelně na jednom výstupu)
    ha_entity: switch.sh_17_wc_led_vent
    notes: >
      Levá buňka dvojvypínače spíná společně LED svítidlo + ventilátor (obé na
      stejném výstupu O1). Ventilátor má vlastní doběhový spínač (potvrzeno
      2026-04-22), proto 1× Plus 2PM stačí — doběh je řešen uvnitř ventilátoru.

  - id: L-37
    name: Strop WC (HUE)
    room: WC
    type: HUE
    voltage: 230V (trvale)
    dimmable: true (via Hue)
