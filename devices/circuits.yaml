    controlled_from: [SW-H2, SW-H3]
    control_mode: 2-way parallel to SW1
    ha_entity: switch.sh_03_lustr_horni_predsin

  - id: L-04
    name: Lustr jídelna
    room: Jídelna
    type: non-HUE
    voltage: 230V
    dimmable: false
    switched_by: SH-04
    controlled_from: [SW-J2]
    ha_entity: switch.sh_04_lustr_jidelna

